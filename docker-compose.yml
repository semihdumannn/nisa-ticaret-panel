version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nisa_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/sites-available/default
    ports:
      - "80:80"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=http://minio:9000
    networks:
      - nisa_network
    depends_on:
      - redis
      - minio

  redis:
    image: redis:7-alpine
    container_name: nisa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - nisa_network
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: nisa_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET:-minio123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - nisa_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nisa_worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - REDIS_HOST=redis
    networks:
      - nisa_network
    depends_on:
      - app
      - redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nisa_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan schedule:work
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - REDIS_HOST=redis
    networks:
      - nisa_network
    depends_on:
      - app
      - redis

networks:
  nisa_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
