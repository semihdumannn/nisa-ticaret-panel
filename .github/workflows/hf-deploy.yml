name: Deploy to HuggingFace Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set FIREBASE_CREDENTIALS JSON in HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          PAYLOAD=$(python3 -c "
import json, os
creds = os.environ['FIREBASE_CREDENTIALS_JSON']
print(json.dumps({'key': 'FIREBASE_CREDENTIALS', 'value': creds}))
")
          curl -s -X POST \
            "https://huggingface.co/api/spaces/semihdumannn/nisa-ticaret-panel/variables" \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            && echo "✅ FIREBASE_CREDENTIALS set in HF Space"

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git push https://semihdumannn:${HF_TOKEN}@huggingface.co/spaces/semihdumannn/nisa-ticaret-panel main --force
